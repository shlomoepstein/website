<!doctype html>
<html lang="en">
<head>
   <meta charset="utf-8" />
   <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
   <title>Fullscreen Video</title>

   <style>
      html, body {
         margin: 0;
         height: 100%;
         background: #000;
      }

      .frame {
         position: fixed;
         inset: 0;
         padding-top: env(safe-area-inset-top);
         padding-right: env(safe-area-inset-right);
         padding-bottom: env(safe-area-inset-bottom);
         padding-left: env(safe-area-inset-left);

         display: flex;
         align-items: center;
         justify-content: center;

         background: #000;
         overflow: hidden;
         touch-action: manipulation;
      }

      video {
         width: 100%;
         height: 100%;
         object-fit: contain;     /* no distortion; change to cover to fill+crop */
         object-position: center;
         background: #000;
      }

      .hint {
         position: fixed;
         left: 12px;
         bottom: 12px;
         font: 14px/1.2 system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
         color: rgba(255,255,255,0.75);
         background: rgba(0,0,0,0.35);
         padding: 8px 10px;
         border-radius: 10px;
      }
   </style>
</head>

<body>
   <div class="frame" id="frame">
      <video id="vid"
             src="purim.mp4"
             playsinline
             muted
             loop
             autoplay
             controls>
      </video>
   </div>

   <script>
      const vid = document.getElementById('vid');
      const frame = document.getElementById('frame');

      // Allow: index.html?video=URL
      const params = new URLSearchParams(location.search);
      const url = params.get('video');
      if (url) vid.src = url;

      // On many mobile browsers, autoplay requires muted + playsinline (set above).
      // Also, some will refuse autoplay until a user gesture — so we try to start on tap.
      async function ensurePlay() {
         try { await vid.play(); } catch {}
      }

      async function toggleFullscreen() {
         try {
            if (document.fullscreenElement) {
               await document.exitFullscreen();
               return;
            }

            // Prefer making the VIDEO fullscreen if possible
            if (vid.requestFullscreen) {
               await vid.requestFullscreen();
            } else if (frame.requestFullscreen) {
               await frame.requestFullscreen();
            }
         } catch {
            // ignored
         }
      }

      // First tap: play (if needed) and request fullscreen (if supported)
      frame.addEventListener('click', async () => {
         await ensurePlay();
         await toggleFullscreen();
      });

      // Desktop convenience
      window.addEventListener('keydown', async (e) => {
         if (e.key.toLowerCase() === 'f') toggleFullscreen();
         if (e.key === ' ') {
            e.preventDefault();
            if (vid.paused) await ensurePlay(); else vid.pause();
         }
      });
   </script>
</body>
</html>
